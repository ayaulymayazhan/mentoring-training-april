<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{% block title %}Mentor Training{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}" />
</head>
<body>
  <header class="site-header">
    <div class="container">
      <div class="brand-wrap">
        <h1>Be a Master Mentor</h1>
        <img
          class="shifu-photo"
          src="{{ url_for('shifu_photo') }}"
          alt="Master Shifu"
          onerror="this.style.display='none'; this.nextElementSibling.style.display='inline-flex';"
        />
        <span class="shifu-fallback" aria-hidden="true">🥋</span>
      </div>
      <nav>
        <a href="{{ url_for('landing_page') }}">Home</a>
        <a href="{{ url_for('progress_page') }}">Progress</a>
        <a href="{{ url_for('reset_demo') }}">Reset Demo</a>
      </nav>
    </div>
  </header>

  <main class="container">
    {% block content %}{% endblock %}
  </main>
</body>
</html>
